{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Mi Sitio Web
        {% endblock %}
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Tailwind (opcional mientras desarrollas) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bloque extra para CSS -->
    {% block extra_css %}
    {% endblock %}
</head>

<body class="min-h-screen flex flex-col bg-gray-100">

    <!-- Navbar -->
    {% include 'navbar.html' %}

    <!-- Contenido principal -->
    <main class="flex-grow container mx-auto p-4">

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    {% include 'footer.html' %}


</body>

</html>
